# =============================================================================
# nas-backup.conf — Edit this file to configure your NAS backup
# =============================================================================

# NAS connection
NAS_HOST="192.168.3.17"
NAS_USER="rsync_user"
NAS_PORT=873

# Password file (chmod 600, contains only the password on a single line)
# Created by setup.sh — change the path here if you move it.
PASSWORD_FILE="$HOME/.rsync-password"

# How often to run (standard cron format)
# Default: every hour at minute 0
CRON_SCHEDULE="0 * * * *"

# Where backup logs go
LOG_FILE="$HOME/.local/log/nas-backup.log"

# -----------------------------------------------------------------------------
# Directory pairs — one per line, format: "/local/path:module/subpath"
#
# The NAS path is:  <rsync module name>/<subdirectory>
#   - The module name is the share you enabled in the NAS rsync service UI
#     (e.g. if your shared folder is "backup", the module is "backup")
#   - The subpath is the folder inside that share
#
# Example: "/home/cristian/Documents:backup/documents"
#   syncs to  rsync://rsync_user@192.168.3.17/backup/documents/
# -----------------------------------------------------------------------------
SYNC_DIRS=(
    "/home/cristian/Projects:Projects (Linux)"
    "/home/cristian/Documents WORK:Documents WORK (Linux)"
    "/home/cristian/Documents PERSONAL:Documents PERSONAL (Linux)"
)
